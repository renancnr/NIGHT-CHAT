<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Chat</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
  height:100vh;
  overflow:hidden;
}

.container{
  width:100%;
  height:100vh;
  display:flex;
}

/* LOGIN */

.login-screen{
  position:fixed;
  inset:0;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.login-box{
  width:95%;
  max-width:400px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:22px;
  padding:35px;
}

.login-box h1{
  text-align:center;
  margin-bottom:10px;
  font-size:32px;
}

.login-box p{
  text-align:center;
  color:#94a3b8;
  margin-bottom:25px;
}

.login-box input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#1f2937;
  color:white;
  margin-bottom:15px;
  outline:none;
}

.login-box button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#6366f1;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* SIDEBAR */

.sidebar{
  width:280px;
  background:#111827;
  border-right:1px solid #1f2937;
  display:flex;
  flex-direction:column;
}

.sidebar-top{
  padding:25px;
  border-bottom:1px solid #1f2937;
}

.logo{
  font-size:24px;
  font-weight:bold;
}

.online-title{
  margin-top:5px;
  color:#94a3b8;
  font-size:14px;
}

.online-users{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  overflow-y:auto;
}

.user{
  background:#1f2937;
  border-radius:14px;
  padding:14px;
  display:flex;
  align-items:center;
  gap:12px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#6366f1;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}

.status{
  font-size:12px;
  color:#22c55e;
}

/* MAIN */

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.topbar{
  height:80px;
  background:#111827;
  border-bottom:1px solid #1f2937;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 25px;
}

.room-name{
  font-size:20px;
  font-weight:bold;
}

.logout-btn{
  border:none;
  background:#ef4444;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.message{
  background:#1f2937;
  padding:14px;
  border-radius:14px;
  max-width:70%;
  word-break:break-word;
}

.self{
  background:#4f46e5;
  align-self:flex-end;
}

.name{
  font-size:13px;
  font-weight:bold;
  margin-bottom:5px;
  opacity:0.8;
}

.send-area{
  background:#111827;
  border-top:1px solid #1f2937;
  padding:20px;
  display:flex;
  gap:12px;
}

.send-area input{
  flex:1;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#1f2937;
  color:white;
  outline:none;
}

.send-btn{
  border:none;
  background:#6366f1;
  color:white;
  padding:16px 24px;
  border-radius:14px;
  cursor:pointer;
  font-weight:bold;
}

@media(max-width:800px){

  .sidebar{
    display:none;
  }

  .message{
    max-width:90%;
  }

}

</style>
</head>
<body>

<!-- LOGIN -->

<div class="login-screen" id="loginScreen">

  <div class="login-box">

    <h1>Night Chat</h1>

    <p>
      Entre no chat em tempo real
    </p>

    <input
      type="text"
      id="username"
      placeholder="Digite seu nome"
    >

    <button onclick="enterChat()">
      Entrar
    </button>

  </div>

</div>

<!-- CHAT -->

<div class="container">

  <div class="sidebar">

    <div class="sidebar-top">

      <div class="logo">
        Night Chat
      </div>

      <div class="online-title">
        Usuários online
      </div>

    </div>

    <div class="online-users" id="onlineUsers"></div>

  </div>

  <div class="main">

    <div class="topbar">

      <div class="room-name">
        Chat Global
      </div>

      <button class="logout-btn" onclick="leaveChat()">
        Sair
      </button>

    </div>

    <div class="messages" id="messages"></div>

    <div class="send-area">

      <input
        type="text"
        id="messageInput"
        placeholder="Digite sua mensagem..."
      >

      <button class="send-btn" onclick="sendMessage()">
        Enviar
      </button>

    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  push,
  onChildAdded,
  set,
  remove,
  onValue,
  get,
  child
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyAJp9gRGp6NSzzfOC-5GBpE-yt2zLokAKI",
  authDomain: "zap2-ed022.firebaseapp.com",
  databaseURL: "https://zap2-ed022-default-rtdb.firebaseio.com",
  projectId: "zap2-ed022",
  storageBucket: "zap2-ed022.firebasestorage.app",
  messagingSenderId: "704782374249",
  appId: "1:704782374249:web:31623cfa778a72bf0599f8"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = "";
let userRef = null;

const messages = document.getElementById("messages");
const onlineUsers = document.getElementById("onlineUsers");

/* LIMPA MENSAGENS ANTIGAS AUTOMATICAMENTE */

messages.innerHTML = "";

/* ENTRAR */

window.enterChat = async function(){

  const username = document.getElementById("username");

  if(username.value.trim() === ""){
    alert("Digite seu nome");
    return;
  }

  currentUser = username.value.trim();

  document.getElementById("loginScreen").style.display = "none";

  userRef = ref(db, "onlineUsers/" + currentUser);

  await set(userRef,{
    name: currentUser
  });

}

/* ENVIAR */

window.sendMessage = function(){

  const input = document.getElementById("messageInput");

  if(input.value.trim() === "") return;

  push(ref(db,"messages"),{
    name: currentUser,
    text: input.value
  });

  input.value = "";

}

/* MENSAGENS */

onChildAdded(ref(db,"messages"), (data)=>{

  const msg = data.val();

  const div = document.createElement("div");

  div.classList.add("message");

  if(msg.name === currentUser){
    div.classList.add("self");
  }

  div.innerHTML = `
    <div class="name">${msg.name}</div>
    <div>${msg.text}</div>
  `;

  messages.appendChild(div);

  messages.scrollTop = messages.scrollHeight;

});

/* USUÁRIOS ONLINE */

onValue(ref(db,"onlineUsers"), (snapshot)=>{

  onlineUsers.innerHTML = "";

  snapshot.forEach((child)=>{

    const user = child.val();

    const div = document.createElement("div");

    div.classList.add("user");

    div.innerHTML = `
      <div class="avatar">
        ${user.name.charAt(0).toUpperCase()}
      </div>

      <div>
        <div>${user.name}</div>
        <div class="status">Online</div>
      </div>
    `;

    onlineUsers.appendChild(div);

  });

});

/* SAIR */

window.leaveChat = async function(){

  if(userRef){
    await remove(userRef);
  }

  location.reload();

}

/* FECHAR ABA */

window.addEventListener("beforeunload", async ()=>{

  if(userRef){
    await remove(userRef);
  }

});

/* ENTER */

document
.getElementById("messageInput")
.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    sendMessage();
  }

});

</script>

</body>
</html>
